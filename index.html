<style>
  html, body {
    margin: 0; padding: 0;
    background: #0c1420;
    min-height: 100vh;
    font-family: 'Dosis', system-ui, sans-serif;
    color: #F2F7FB;
    overflow: hidden;
  }
  * { box-sizing: border-box; }

  /* Zjednotená farba vodiacich ikon v textových poliach */
  .lf-lead-icon svg { stroke: #3FA9E0 !important; }

  .stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .phone-wrap {
    position: relative;
    width: 390px; height: 844px;
    flex-shrink: 0;
  }

  /* Hotspots */
  .hotspot {
    position: absolute;
    background: transparent;
    cursor: pointer;
    z-index: 100;
    border-radius: 14px;
    pointer-events: auto;
    transition: background .12s ease, transform .12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .hotspot:active {
    background: rgba(125,184,0,0.14);
    transform: scale(0.975);
  }
  body.debug-hotspots .hotspot {
    background: rgba(255,215,80,0.12);
    outline: 1.5px dashed rgba(255,215,80,0.8);
  }

  /* ── Smoother screen transitions — len fade, telefón ostáva statický ── */
  @keyframes screen-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .screen-in { animation: screen-in .26s ease both; }

  @keyframes screen-back {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .screen-back { animation: screen-back .26s ease both; }

  /* ── Overlay animations ── */
  @keyframes backdrop-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes drawer-slide-in {
    from { transform: translateX(-102%); }
    to   { transform: translateX(0); }
  }
  @keyframes sheet-slide-in {
    from { transform: translateX(106%); }
    to   { transform: translateX(0); }
  }
  .drawer-overlay { animation: backdrop-in .26s ease both; }
  .drawer-overlay > div:first-child {
    animation: drawer-slide-in .34s cubic-bezier(0.22,0.61,0.36,1) both;
    will-change: transform;
  }
  .filter-overlay { animation: backdrop-in .24s ease both; }
  .filter-overlay > div:first-child {
    animation: sheet-slide-in .32s cubic-bezier(0.22,0.61,0.36,1) both;
    will-change: transform;
  }
  @keyframes sheet-up {
    from { transform: translateY(102%); }
    to   { transform: translateY(0); }
  }
  .sheet-overlay { animation: backdrop-in .24s ease both; }
  .sheet-overlay > div:first-child {
    animation: sheet-up .34s cubic-bezier(0.22,0.61,0.36,1) both;
    will-change: transform;
  }

  /* ── Tap ripple ── */
  @keyframes tap-ripple {
    from { transform: translate(-50%,-50%) scale(0.2); opacity: 0.55; }
    to   { transform: translate(-50%,-50%) scale(1); opacity: 0; }
  }
  .tap-ripple {
    position: absolute;
    width: 120px; height: 120px;
    margin: 0; border-radius: 50%;
    background: radial-gradient(circle, rgba(125,184,0,0.45) 0%, rgba(125,184,0,0) 70%);
    pointer-events: none;
    z-index: 250;
    animation: tap-ripple .5s ease-out forwards;
  }

  @media (prefers-reduced-motion: reduce) {
    .screen-in, .screen-back, .drawer-overlay > div:first-child, .filter-overlay > div:first-child { animation-duration: .01ms; }
  }

  @keyframes toast-anim {
    0%   { opacity: 0; transform: translate(-50%, 14px) scale(.96); }
    12%, 82% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -8px) scale(.96); }
  }
  .toast {
    position: fixed; left: 50%; bottom: 72px;
    transform: translateX(-50%);
    padding: 11px 20px;
    background: rgba(10,18,30,.96);
    color: #FFD750;
    border: 1.5px solid rgba(255,215,80,.30);
    border-radius: 999px;
    font-weight: 700; font-size: 14px;
    animation: toast-anim 1.7s ease forwards;
    pointer-events: none; z-index: 400;
    white-space: nowrap;
  }

  /* Nav chrome */
  .top-chrome {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px;
    z-index: 300;
    pointer-events: none;
  }
  .top-chrome > * { pointer-events: auto; }

  .chrome-btn {
    height: 36px; padding: 0 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.07);
    color: #F2F7FB; font-family: inherit; font-weight: 700; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
    transition: background .14s;
    white-space: nowrap;
  }
  .chrome-btn:hover { background: rgba(255,255,255,.15); }
  .chrome-btn:active { background: rgba(255,255,255,.22); transform: scale(.96); }
  .chrome-btn:disabled { opacity: .3; cursor: not-allowed; }

  .flow-pills {
    display: flex; align-items: center; gap: 4px;
    flex-wrap: nowrap; overflow: hidden;
    flex: 1; min-width: 0;
  }
  .flow-pill {
    font-size: 11px; font-weight: 700; letter-spacing: .3px;
    color: rgba(242,247,251,.45); text-transform: uppercase;
    white-space: nowrap; cursor: default;
  }
  .flow-pill.active { color: #FFD750; }
  .flow-sep { color: rgba(255,255,255,.2); font-size: 10px; }

  .step-badge {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 999px; padding: 6px 14px;
    font-size: 12px; font-weight: 700; color: rgba(255,255,255,.55);
    pointer-events: none; z-index: 300;
  }
  .step-badge .cur { color: #FFD750; }

  /* Debug toggle */
  .debug-toggle {
    position: fixed; bottom: 14px; right: 14px;
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,.3);
    cursor: pointer; z-index: 300;
    padding: 4px 8px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,.1);
  }
  .debug-toggle:hover { color: #FFD750; border-color: rgba(255,215,80,.4); }

  /* Interný prepínač vzhľadu (žiak / učiteľ) — nie je súčasť dizajnu */
  .mode-toggle {
    position: fixed; bottom: 14px; left: 14px;
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12.5px; font-weight: 800; color: #fff;
    cursor: pointer; z-index: 400;
    padding: 8px 14px; border-radius: 999px;
    border: 1.5px solid #7DB800;
    background: #0c1420;
    box-shadow: 0 4px 14px -4px rgba(0,0,0,.6);
    font-family: inherit;
    transition: border-color .14s, transform .1s;
  }
  .mode-toggle:hover { transform: translateY(-1px); }
  .mode-toggle:active { transform: scale(.97); }
  .mode-toggle.ucitel { border-color: #00A8B5; }
  .mode-toggle .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #7DB800;
    box-shadow: 0 0 0 3px rgba(125,184,0,.25);
  }
  .mode-toggle.ucitel .dot { background: #00A8B5; box-shadow: 0 0 0 3px rgba(0,168,181,.25); }

// Zoznam krokov pre každú cestu
const TRACKS = {
  main:     ['onboarding', 'onboarding-2', 'login', 'login-heslo', 'product', 'categories', 'interaktivne', 'priroda', 'tests', 'test-open'],
  pracovne: ['categories', 'pracovne-listy', 'pracovne-sport', 'grafomotorika', 'pracovny-list-open'],
  alfbook:  ['ab-rocniky', 'ab-predmety', 'ab-temy', 'ab-obsah'],
  profile:  ['profile-zakladne', 'profile-heslo', 'profile-ucitel', 'profile-ziak', 'profile-gdpr'],
  ucitel:   ['historia-ucitel', 'test-vysledky'],
  register: ['reg-sk01', 'reg-sk02', 'reg-sk03', 'reg-ft03', 'reg-sk03b', 'reg-done'],
};

function App() {
  const [stack, setStack]           = React.useState(() => {
    const s = new URLSearchParams(location.search).get('screen');
    return (s && FLOW[s]) ? [s] : ['onboarding'];
  });
  const [toast, setToast]           = React.useState(null);
  const [filterOpen, setFilterOpen] = React.useState(false);
  const [profileOpen, setProfileOpen] = React.useState(false);
  const [activeAge, setActiveAge]   = React.useState('all');
  const [activeCat, setActiveCat]   = React.useState('interaktivne');
  const [subscribed, setSubscribed] = React.useState(true);
  const [goingBack, setGoingBack]   = React.useState(false);
  const [lang, setLang]             = React.useState('sk');
  const [alfbookSheet, setAlfbookSheet] = React.useState(false);
  const [viewMode, setViewMode]     = React.useState('ziak'); // 'ziak' | 'ucitel' — interný prepínač vzhľadu
  const [alfbookLang, setAlfbookLang]   = React.useState('sk');

  const current = stack[stack.length - 1];
  const step    = FLOW[current];

  const closeAll = () => { setFilterOpen(false); setProfileOpen(false); setAlfbookSheet(false); };

  const go = (key, cat) => {
    closeAll();
    setGoingBack(false);
    if (cat) setActiveCat(cat);
    setStack(s => [...s, key]);
  };

  const back = () => {
    closeAll();
    if (stack.length <= 1) return;
    setGoingBack(true);
    setStack(s => s.slice(0, -1));
  };

  const restart = () => {
    closeAll();
    setGoingBack(true);
    setStack(['login']);
  };

  const closeProfile = () => {
    closeAll();
    setStack(s => {
      let i = s.length - 1;
      while (i >= 1 && FLOW[s[i]].track === 'profile') i--;
      return s.slice(0, i + 1);
    });
  };

  const switchTab = (key) => {
    closeAll();
    setStack(s => {
      if (FLOW[s[s.length - 1]].track === 'profile') return [...s.slice(0, -1), key];
      return [...s, key];
    });
  };

  // AlfBook: klik na dlaždicu otvorí AlfBook flow (Ročníky → Predmety → Témy → Obsah)
  const AB_NAMES = { sk: 'slovenčine', cz: 'češtine', hu: 'maďarčine' };
  const openAlfBook = () => {
    setProfileOpen(false);
    go('ab-rocniky');
  };

  const showToast = (text) => {
    setToast({ text, key: Date.now() });
    setTimeout(() => setToast(null), 1700);
  };

  const spawnRipple = (e) => {
    const sc = document.getElementById('screen-content');
    if (!sc) return;
    const rect = sc.getBoundingClientRect();
    const scale = rect.width / 390 || 1;
    const x = (e.clientX - rect.left) / scale;
    const y = (e.clientY - rect.top) / scale;
    const r = document.createElement('div');
    r.className = 'tap-ripple';
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    sc.appendChild(r);
    setTimeout(() => r.remove(), 500);
  };

  // — Touch: dovolí scrollovať aj keď prst chytí dlaždicu (hotspot) —
  const touchRef = React.useRef({ y: 0, x: 0, lastY: 0, moved: false, el: null });

  const onSpotTouchStart = (e) => {
    const t = e.touches[0];
    const el = document.querySelector('#phone-wrap [data-scroll-area]');
    touchRef.current = { y: t.clientY, x: t.clientX, lastY: t.clientY, moved: false, el };
  };

  const onSpotTouchMove = (e) => {
    const t = e.touches[0];
    const st = touchRef.current;
    if (Math.abs(t.clientY - st.y) > 8 || Math.abs(t.clientX - st.x) > 8) st.moved = true;
    if (st.el) {
      const wrap = document.getElementById('phone-wrap');
      const rect = wrap.getBoundingClientRect();
      const scale = rect.width / 390 || 1;
      st.el.scrollTop -= (t.clientY - st.lastY) / scale;
    }
    st.lastY = t.clientY;
  };

  const handleSpot = (spot) => {
    if (spot.filter)       return setFilterOpen(true);
    if (spot.profile)      return setProfileOpen(true);
    if (spot.tab)          return switchTab(spot.tab);
    if (spot.closeProfile) return closeProfile();
    if (spot.alfbook)      return openAlfBook();
    if (spot.vysledky)     return viewMode === 'ucitel' ? go('test-vysledky') : go('test-open');
    if (spot.abVysledky)   return viewMode === 'ucitel' ? go('ab-test-vysledky') : showToast('Cvičenie — pripravujeme');
    if (spot.go === 'back') return back();
    if (spot.go)           return go(spot.go, spot.cat);
    if (spot.toast)        showToast(spot.toast);
  };

  // Update chrome
  React.useEffect(() => {
    const track = FLOW[current].track;
    const order = TRACKS[track] || [];
    const idx   = order.indexOf(current);
    const pills = order.map(k => ({
      key: k, label: FLOW[k].label, active: k === current
    }));
    const el = document.getElementById('flow-pills');
    if (el) {
      el.innerHTML = pills.map((p, i) =>
        (i > 0 ? '<span class="flow-sep">›</span>' : '') +
        `<span class="flow-pill${p.active ? ' active' : ''}">${p.label}</span>`
      ).join('');
    }
    const badge = document.getElementById('step-badge');
    if (badge) badge.innerHTML = `<span class="cur">${(idx >= 0 ? idx : 0) + 1}</span> / ${order.length} &nbsp;${step.label}`;

    const btnBack = document.getElementById('btn-back');
    if (btnBack) btnBack.disabled = stack.length <= 1;
  }, [current, stack.length]);

  // Dynamický fade pre scroll oblasti — sleduje scrollTop po každom rendrovaní
  React.useEffect(() => {
    const applyFade = (el) => {
      const atTop    = el.scrollTop < 6;
      const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 6;
      const top = atTop    ? '#000 0%'                    : 'transparent 0px, #000 28px';
      const bot = atBottom ? '#000 100%'                  : '#000 calc(100% - 32px), transparent 100%';
      const mask = `linear-gradient(180deg, ${top}, ${bot})`;
      el.style.WebkitMaskImage = mask;
      el.style.maskImage = mask;
    };
    const wrap = document.getElementById('phone-wrap');
    if (!wrap) return;
    const els = wrap.querySelectorAll('[data-scroll-area]');
    const cleanups = [];
    els.forEach(el => {
      applyFade(el);
      const handler = () => applyFade(el);
      el.addEventListener('scroll', handler, { passive: true });
      cleanups.push(() => el.removeEventListener('scroll', handler));
    });
    return () => cleanups.forEach(fn => fn());
  });

  // Fit phone to viewport
  React.useEffect(() => {
    const fit = () => {
      const wrap = document.getElementById('phone-wrap');
      if (!wrap) return;
      const pad = 90; // reserve for top/bottom chrome
      const sx = (window.innerWidth - 20) / 390;
      const sy = (window.innerHeight - pad) / 844;
      const s  = Math.min(sx, sy, 1.1);
      wrap.style.transform = `scale(${s})`;
      wrap.style.transformOrigin = 'center center';
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  // Forward scroll to inner scrollable area
  React.useEffect(() => {
    const wrap = document.getElementById('phone-wrap');
    if (!wrap) return;
    const findScroll = () => {
      const tagged = wrap.querySelector('[data-scroll-area]');
      if (tagged) return tagged;
      const all = wrap.querySelectorAll('div');
      for (const d of all) {
        if (d.scrollHeight > d.clientHeight + 2) {
          const ov = getComputedStyle(d).overflowY;
          if (ov === 'auto' || ov === 'scroll') return d;
        }
      }
      return null;
    };
    const onWheel = (e) => {
      const sc = findScroll();
      if (!sc || sc.contains(e.target)) return;
      if (sc.scrollHeight > sc.clientHeight) {
        sc.scrollBy({ top: e.deltaY });
        e.preventDefault();
      }
    };
    wrap.addEventListener('wheel', onWheel, { passive: false });
    return () => wrap.removeEventListener('wheel', onWheel);
  }, []);

  // Wire chrome buttons + debug toggle
  React.useEffect(() => {
    const b = document.getElementById('btn-back');
    const r = document.getElementById('btn-restart');
    const d = document.getElementById('debug-toggle');
    if (b) b.onclick = back;
    if (r) r.onclick = restart;
    if (d) d.onclick = () => document.body.classList.toggle('debug-hotspots');
    if (location.search.includes('debug')) document.body.classList.add('debug-hotspots');
  }, []);

  // Interný prepínač vzhľadu (žiak/učiteľ) — aj klávesa "v"
  React.useEffect(() => {
    const onKey = (e) => {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      if (e.key === 'v' || e.key === 'V') {
        setViewMode(m => {
          const next = m === 'ziak' ? 'ucitel' : 'ziak';
          showToast(next === 'ucitel' ? 'Učiteľský vzhľad' : 'Žiacky vzhľad');
          return next;
        });
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const animClass = goingBack ? 'screen-back' : 'screen-in';

  return (
    <>
      <div
        id="screen-content"
        key={current + '|' + stack.length}
        className={animClass}
        onClick={(e) => {
          const cb = e.target.closest('[data-checkbox]');
          if (cb && cb.dataset.checkbox === 'subscribed') setSubscribed(v => !v);
        }}
        style={{ width: 390, height: 844, position: 'relative', borderRadius: 44, overflow: 'hidden' }}
      >
        {step.render({ activeAge, subscribed, activeCat, alfbookLang, lang, viewMode, onLang: setLang, go, back, restart })}

        {/* HOTSPOT OVERLAY */}
        <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
          {step.spots.map((h, i) => (
            <div
              key={i}
              className="hotspot"
              style={{ left: h.x, top: h.y, width: h.w, height: h.h }}
              onTouchStart={onSpotTouchStart}
              onTouchMove={onSpotTouchMove}
              onClick={(e) => { if (touchRef.current.moved) { touchRef.current.moved = false; return; } spawnRipple(e); handleSpot(h); }}
              title={
                h.go === 'back' ? '← späť' :
                h.go ? `→ ${FLOW[h.go]?.label || h.go}` :
                h.filter ? '🔍 Filter veku' :
                h.profile ? '👤 Menu' :
                h.toast || ''
              }
            />
          ))}
        </div>

        {/* VEKOVY FILTER OVERLAY */}
        {filterOpen && (
          <div
            className="filter-overlay"
            onClick={() => setFilterOpen(false)}
            style={{
              position: 'absolute', top: 50, left: 0, right: 0, bottom: 0,
              zIndex: 150,
              background: 'rgba(10,22,40,0.28)',
              backdropFilter: 'blur(2px)',
              WebkitBackdropFilter: 'blur(2px)',
            }}
          >
            {window.AgePickerSheet && <window.AgePickerSheet dark={false} active={activeAge}/>}
            {['all','3-4','4-5','5-6'].map((age, i) => (
              <div
                key={age}
                className="hotspot"
                style={{ position: 'absolute', left: 288, top: 14 + i * 98, width: 92, height: 90, zIndex: 160 }}
                onClick={(e) => {
                  e.stopPropagation();
                  setActiveAge(age);
                  setTimeout(() => setFilterOpen(false), 180);
                }}
                title={age === 'all' ? 'Vsetky vekove skupiny' : `${age} rokov`}
              />
            ))}
          </div>
        )}

        {/* PROFIL / DRAWER OVERLAY — zacina pod status barom (top:50) */}
        {profileOpen && (
          <div
            className="drawer-overlay"
            onClick={() => setProfileOpen(false)}
            style={{
              position: 'absolute', top: 50, left: 0, right: 0, bottom: 0,
              zIndex: 150,
              background: 'rgba(10,22,40,0.22)',
              backdropFilter: 'blur(2px)',
              WebkitBackdropFilter: 'blur(2px)',
            }}
          >
            {window.ProfileDrawerV2 && <window.ProfileDrawerV2
              dark={false}
              lang={lang}
              product={FLOW[current].track === 'alfbook' ? 'alfbook' : 'alfik'}
              onLang={(code) => setLang(code)}
              onEduAlf={() => { setProfileOpen(false); go('product'); }}
              onAlfBook={openAlfBook}
              onAlfik={() => { setProfileOpen(false); if (FLOW[current].track === 'alfbook') go('categories'); }}
              onHistoria={() => { setProfileOpen(false); go('historia-ucitel'); }}
              onProfil={() => { setProfileOpen(false); go('profile-zakladne'); }}
              onNastavenia={() => { setProfileOpen(false); go('nastavenia'); }}
              onAdmin={() => { showToast('Administrácia — pripravujeme'); }}
              onPodpora={() => { showToast('Podpora — pripravujeme'); }}
              onAbout={() => { showToast('O EduAlf — pripravujeme'); }}
              onLogout={() => { restart(); }}
            />}
          </div>
        )}

        {/* ALFBOOK — VÝBER JAZYKA (appka beží v angličtine) */}
        {alfbookSheet && (
          <div
            className="sheet-overlay"
            onClick={() => setAlfbookSheet(false)}
            style={{
              position: 'absolute', top: 50, left: 0, right: 0, bottom: 0,
              zIndex: 200,
              background: 'rgba(15,30,55,0.42)',
            }}
          >
            {window.AlfBookLangSheet && <window.AlfBookLangSheet
              onPick={(code) => { setAlfbookSheet(false); setTimeout(() => showToast(`AlfBook v ${AB_NAMES[code] || code} — pripravujeme`), 80); }}
              onCancel={() => setAlfbookSheet(false)}
            />}
          </div>
        )}
      </div>

      {toast && <div key={toast.key} className="toast">{toast.text}</div>}

      {/* Interný prepínač vzhľadu — žiak / učiteľ (ovplyvňuje zoznam testov) */}
      <button
        className={'mode-toggle' + (viewMode === 'ucitel' ? ' ucitel' : '')}
        onClick={() => setViewMode(m => m === 'ziak' ? 'ucitel' : 'ziak')}
        title="Interné: prepnúť vzhľad žiak / učiteľ"
      >
        <span className="dot"></span>
        {viewMode === 'ucitel' ? 'Učiteľský vzhľad' : 'Žiacky vzhľad'}
      </button>
    </>
  );
}

// ── Čakáme, kým sa načítajú všetky screen komponenty ─────────
const start = () => {
  const ok =
    window.WalkthroughScreen1 && window.WalkthroughScreen2 &&
    window.LoginStep2Screen &&
    window.LoginScreen && window.ForgotPasswordScreen &&
    window.VerifyCodeScreen && window.NewPasswordScreen &&
    window.PasswordChangedScreen && window.ProductChoiceScreen &&
    window.CategoryTreeScreen && window.SubcategoryScreen &&
    window.PrirodaScreen && window.TestListV2Screen &&
    window.TestOpenScreen && window.AgePickerSheet &&
    window.TestListTeacherPro2Screen &&
    window.PracovneListyScreen && window.SportPracovneScreen &&
    window.GrafomotorikaScreen && window.PracovnyListOpenScreen &&
    window.ProfileZakladneScreen && window.ProfileHesloScreen &&
    window.ProfileUcitelScreen && window.ProfileZiakScreen &&
    window.ProfileGdprScreen && window.CategoryHero && window.SubTile &&
    window.AlfBookLangSheet && window.NastaveniaScreen &&
    window.AbRocnikyScreen && window.AbPredmetyScreen &&
    window.AbTemyScreen && window.AbObsahScreen && window.AbObsahTeacherScreen &&
    window.HistoriaUcitelScreen && window.HistoriaZiakScreen && window.TestVysledkyScreen &&
    window.FreeTrialEmailScreen && window.FreeTrialCodeScreen && window.FreeTrialChoiceScreen &&
    window.FreeTrialRegFormScreen && window.FreeTrialDoneScreen &&
    window.SkolaChoiceScreen && window.SkolaLicenseRoleScreen && window.SkolaFormScreen && window.SkolaFormTeacherScreen;

  if (!ok) return setTimeout(start, 40);
  ReactDOM.createRoot(document.getElementById('screen-root')).render(<App/>);
};
start();
</script>
